<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clips Factory — TikTok Callback</title>
  <style>
    :root{--bg:#0b1020;--card:rgba(255,255,255,.08);--text:#eef2ff;--muted:#b8c0ff;--accent:#25f4ee;--border:rgba(255,255,255,.12)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);background:linear-gradient(180deg,#0b1020 0%,#090d19 100%);min-height:100vh;display:grid;place-items:center;padding:20px}
    .card{width:min(680px,100%);background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    h1{margin:0 0 12px}
    p{margin:0 0 12px;color:var(--muted);line-height:1.7}
    .row{margin-top:18px;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:16px;font-family:ui-monospace,Consolas,monospace;font-size:.94rem;word-break:break-word}
    .ok{color:var(--accent)}
    a{color:#fff}
  </style>
</head>
<body>
  <div class="card">
    <h1>TikTok callback received</h1>
    <p>This page captures the TikTok authorization response and continues the creator flow to the dashboard.</p>
    <div class="row" id="statusBox">Reading callback parameters...</div>
    <p id="nextText">Redirecting to dashboard in a moment.</p>
    <p><a href="dashboard.html">Continue manually to dashboard</a></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");

    const statusBox = document.getElementById("statusBox");
    const nextText = document.getElementById("nextText");

    if (code) {
      localStorage.setItem("cf_tiktok_code", code);
      localStorage.setItem("cf_tiktok_state", state || "");
      localStorage.setItem("cf_tiktok_connected", "true");
      localStorage.setItem("cf_tiktok_connected_at", new Date().toISOString());
      statusBox.innerHTML = '<span class="ok">Authorization code captured successfully.</span><br><br>code=' + code;
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1800);
    } else if (error) {
      statusBox.textContent = "TikTok returned an error: " + error;
      nextText.textContent = "Review the app configuration and try again.";
    } else {
      statusBox.textContent = "No code was found in the callback URL.";
      nextText.textContent = "Try the TikTok login flow again from the homepage.";
    }
  </script>
</body>
</html>
